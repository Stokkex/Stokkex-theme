<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Stokkex</title>
<!-- Stylesheets -->
<link href="../assets/css/bootstrap.css" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
<link href="../assets/css/meanmenu.min.css" rel="stylesheet">
<link href="../assets/css/responsive.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="shortcut icon" href="../assets/images/favicon.png" type="image/x-icon">
<link rel="icon" href="../assets/images/logo.png" type="image/x-icon">

<!-- Responsive -->
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

</head>

<body>

<div class="page-wrapper">
	
	<!-- Preloader -->
	<div class="loader-wrap">
		<div class="preloader">
			<div class="preloader-close">x</div>
			<div id="handle-preloader" class="handle-preloader">
				<div class="animation-preloader">
					<div class="logo-wrapper">
						<img src="../assets/images/logo.png" alt="Stokkex Logo" class="loader-logo" />
						<div class="logo-shadow"></div>
					</div>
					<div class="txt-loading">
						<span data-text-preloader="S" class="letters-loading">S</span>
						<span data-text-preloader="T" class="letters-loading">T</span>
						<span data-text-preloader="O" class="letters-loading">O</span>
						<span data-text-preloader="K" class="letters-loading">K</span>
						<span data-text-preloader="K" class="letters-loading">K</span>
						<span data-text-preloader="E" class="letters-loading">E</span>
						<span data-text-preloader="X" class="letters-loading">X</span>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- Preloader End -->
	
    <section class="register-one resgister-area">
		<div class="auto-container">
			<div class="inner-container">
				<div class="text-center">
                    <a href="../">
                        <img src="../assets/images/logo.png" class="img-fluid mb-3" alt="" srcset="">
                    </a>
                    <h3 class="fw-bold">Registration</h3>
					<p class="fw-semibold text-white mt-2 mb-4">Let’s get registered and begin a new journey with Stokkex.</p>
                </div>
				
				<!-- Register Form -->
				<div class="register-form mt-3">
					<form method="post">
						<div class="form-group d-flex justify-content-start mt-4 mb-2">
							<div class="form-check">
                                <input class="form-check-input" name="roles" type="radio" value="" id="buyer">
                                <label class="form-check-label text-white" for="buyer">Buyer</label>
                            </div>
                            <div class="form-check ms-4">
                                <input class="form-check-input" type="radio" value="" name="roles" id="seller" checked>
                                <label class="form-check-label text-white" for="seller">Seller</label>
                            </div>
						</div>
						<div class="form-group">
							<label class="text-white">Name*</label>
							<input type="text" name="name" class="form-control"  required="">
						</div>
						<div class="form-group">
							<label class="text-white">Email*</label>
							<input type="email" name="email" class="form-control"  required="">
						</div>
						<div class="form-group">
							<label class="text-white">Password*</label>
							<a href="javascript:void(0);" onclick="togglePassword()" ><span id="eyeIcon" class="icon text-white fa-regular fa-eye fa-fw"></span></a>
							<input type="password" name="password" class="form-control" id="password"  required="">
						</div>
						<div class="form-group">
							<div class="form-check">
                                <input class="form-check-input border border-dark" name="agree" type="checkbox" value="" id="agree" required>
                                <label class="form-check-label text-white" for="agree">By checking this box, I agree to the website’s Terms and Privacy Policy.</label>
                            </div>
						</div>
						<div class="form-group">
							<!-- Button Box -->
							<button type="submit" class="submit-btn btn-style-one">
								<span class="btn-wrap">
									<span class="text-one">Register Now</span>
									<span class="text-two">Register Now</span>
								</span>
							</button>
						</div>
						<div class="form-group text-center mt-4">
							<div class="creat-account"><span class="text-dark fw-semibold">Already have an account?</span> <a href="../login/">Login Now</a></div>
						</div>
					</form>
				</div>
				<!-- End Default Form -->

			</div>
		</div>
	</section>
	
</div>
<!-- End PageWrapper -->

<div class="progress-wrap">
	<svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
		<path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98"/>
	</svg>
</div>

<script src="../assets/js/jquery.js"></script>
<script src="../assets/js/popper.min.js"></script>
<script src="../assets/js/bootstrap.min.js"></script>
<script src="../assets/js/appear.js"></script>
<script src="../assets/js/parallax.min.js"></script>
<script src="../assets/js/tilt.jquery.min.js"></script>
<script src="../assets/js/jquery.paroller.min.js"></script>
<script src="../assets/js/wow.js"></script>
<script src="../assets/js/swiper.min.js"></script>
<script src="../assets/js/backtotop.js"></script>
<script src="../assets/js/odometer.js"></script>
<script src="../assets/js/parallax-scroll.js"></script>

<script src="../assets/js/gsap.min.js"></script>
<script src="../assets/js/SplitText.min.js"></script>
<script src="../assets/js/ScrollTrigger.min.js"></script>
<script src="../assets/js/ScrollToPlugin.min.js"></script>
<script src="../assets/js/ScrollSmoother.min.js"></script>

<script src="../assets/js/touchspin.js"></script>
<script src="../assets/js/jquery.marquee.min.js"></script>
<script src="../assets/js/magnific-popup.min.js"></script>
<script src="../assets/js/nav-tool.js"></script>
<script src="../assets/js/jquery-ui.js"></script>
<script src="../assets/js/element-in-view.js"></script>
<script src="../assets/js/script.js"></script>
<script src="../assets/js/custom.js"></script>


</body>
</html>
